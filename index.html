<?php
// Database Connection
$conn = mysqli_connect("localhost", "root", "", "phone_shop");

if (!$conn) {
    die("Connection Failed: " . mysqli_connect_error());
}

// ADD PHONE
if (isset($_POST['add'])) {
    $brand = $_POST['brand'];
    $model = $_POST['model'];
    $price = $_POST['price'];
    $stock = $_POST['stock'];

    mysqli_query($conn, "INSERT INTO phones (brand, model, price, stock)
    VALUES ('$brand','$model','$price','$stock')");
    header("Location: index.php");
    exit();
}

// DELETE PHONE
if (isset($_GET['delete'])) {
    $id = $_GET['delete'];
    mysqli_query($conn, "DELETE FROM phones WHERE id=$id");
    header("Location: index.php");
    exit();
}

// UPDATE PHONE
if (isset($_POST['update'])) {
    $id = $_POST['id'];
    $brand = $_POST['brand'];
    $model = $_POST['model'];
    $price = $_POST['price'];
    $stock = $_POST['stock'];

    mysqli_query($conn, "UPDATE phones SET
        brand='$brand',
        model='$model',
        price='$price',
        stock='$stock'
        WHERE id=$id");

    header("Location: index.php");
    exit();
}

// EDIT DATA
$edit = false;
if (isset($_GET['edit'])) {
    $edit = true;
    $id = $_GET['edit'];
    $phone = mysqli_fetch_assoc(mysqli_query($conn, "SELECT * FROM phones WHERE id=$id"));
}
?>

<!DOCTYPE html>

    <div class="card p-4 mb-4">

        <h4><?= $edit ? "Edit Phone" : "Add New Phone"; ?></h4>

        <form method="POST">

            <?php if($edit){ ?>
                <input type="hidden" name="id" value="<?= $phone['id']; ?>">

            <input type="text"
                   name="brand"

            <input type="number"
                   step="0.01"
                   name="price"
                   class="form-control mb-3"
                   placeholder="Price"
                   value="<?= $edit ? $phone['price'] : ''; ?>"

            <input type="number"
                   name="stock"
                   class="form-control mb-3"

            <?php if($edit){ ?>
                <button class="btn btn-warning" name="update">Update Phone</button>
                <a href="index.php" class="btn btn-secondary">Cancel</a>
            <?php } else { ?>
                <button class="btn btn-success" name="add">Add Phone</button>
            <?php } ?>

        </form>

    <table class="table table-bordered table-hover bg-white">

        <thead class="table-dark">

        <tr>

            <th>Stock</th>

        </tr>

        </thead>

        <tbody>

        <?php

        $result = mysqli_query($conn, "SELECT * FROM phones ORDER BY id DESC");

        while($row = mysqli_fetch_assoc($result))
